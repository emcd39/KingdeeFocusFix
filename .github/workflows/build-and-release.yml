name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build HookDll (C++ DLL)
        run: |
          msbuild HookDll/HookDll.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /p:WindowsTargetPlatformVersion=10.0

      - name: Setup .NET Framework
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build FixApp (C# EXE)
        run: dotnet build FixApp/FixApp.csproj -c Release

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          copy "HookDll\x64\Release\HookDll.dll" "release\"
          copy "FixApp\bin\Release\net48\KingdeeFocusFix.exe" "release\"
          copy "README.md" "release\"
          copy "LICENSE" "release\" 2>$null || echo "No LICENSE file"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KingdeeFocusFix-${{ inputs.version }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: KingdeeFocusFix-${{ inputs.version }}
          path: release/

      - name: Create ZIP archive
        run: |
          cd release
          zip -r ../KingdeeFocusFix-${{ inputs.version }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: KingdeeFocusFix ${{ inputs.version }}
          body: |
            ## KingdeeFocusFix ${{ inputs.version }}

            金蝶云·星空财务报表系统焦点修复工具

            ### 使用方法
            1. 下载并解压 ZIP 文件
            2. 右键 `KingdeeFocusFix.exe` → 以管理员身份运行
            3. 系统托盘出现盾牌图标表示运行中

            ### 文件说明
            - `KingdeeFocusFix.exe` - 主程序（托盘应用）
            - `HookDll.dll` - CBT 钩子 DLL
            - `README.md` - 详细说明文档

            ### 系统要求
            - Windows 10 / Windows 11 (x64)
            - 无需额外运行时（.NET Framework 4.8 系统自带）
          draft: false
          prerelease: false
          files: |
            KingdeeFocusFix-${{ inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
